services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobrunr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobrunr_password}
      POSTGRES_DB: ${POSTGRES_DB:-jobrunr}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobrunr} -d ${POSTGRES_DB:-jobrunr}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"   # mapped to 5433 to avoid conflicts with local native Postgres

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jobrunr}:${POSTGRES_PASSWORD:-jobrunr_password}@db:5432/${POSTGRES_DB:-jobrunr}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: on-failure

  worker-standard:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jobrunr}:${POSTGRES_PASSWORD:-jobrunr_password}@db:5432/${POSTGRES_DB:-jobrunr}
      WORKER_ID: standard-1
      WORKER_TYPE: standard
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  worker-highcompute:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jobrunr}:${POSTGRES_PASSWORD:-jobrunr_password}@db:5432/${POSTGRES_DB:-jobrunr}
      WORKER_ID: high-1
      WORKER_TYPE: high_compute
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
